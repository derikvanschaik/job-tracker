<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple React with Tailwind</title>
    <!-- Include Tailwind CSS from CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <!-- Include React and ReactDOM from CDN -->
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <!-- Babel Script (to handle JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      function App() {
        const [jobs, setJobs] = React.useState([]);
        const [showForm, setShowForm] = React.useState(false); // New state to toggle form display

        React.useEffect(() => {
          fetch("/")
            .then((response) => response.json())
            .then((data) => setJobs(data))
            .catch((error) => console.error("Error fetching data:", error));
        }, []);

        const addJob = (job) => {
          setJobs([...jobs, job]);
          setShowForm(false); // Hide form after adding job
        };

        const handleSubmit = (event) => {
          event.preventDefault();
          const { company, role } = event.target.elements;
          addJob({
            id: jobs.length + 1,
            company: company.value,
            role: role.value,
            date: new Date().toISOString(),
            status: "Pending",
          });
        };

        return (
          <div className="flex flex-col items-center justify-center min-h-screen bg-gray-100 transition-all">
            <div className="flex flex-col mb-3">
              <h1 className="text-3xl font-bold underline text-center text-blue-600 mb-6">
                Job Applications
              </h1>
              {!showForm && (
                <button
                  className="bg-transparent text-blue-700 font-semibold py-2 px-4 border border-blue-500 rounded"
                  onClick={() => setShowForm(true)}
                >
                  Add New
                </button>
              )}
            </div>

            {showForm ? (
              <div>
                <button
                  className="bg-transparent text-blue-700 font-semibold py-2 px-4 border border-blue-500 rounded mb-4"
                  onClick={() => setShowForm(false)}
                >
                  Back to browse
                </button>
                <form
                  onSubmit={handleSubmit}
                  className="bg-white p-4 rounded-lg shadow"
                >
                  <input
                    className="border rounded p-2 m-2"
                    name="company"
                    placeholder="Company"
                    required
                  />
                  <input
                    className="border rounded p-2 m-2"
                    name="role"
                    placeholder="Role"
                    required
                  />
                  <button
                    type="submit"
                    className="bg-blue-500 text-white py-2 px-4 rounded"
                  >
                    Submit
                  </button>
                </form>
              </div>
            ) : (
              <div className="space-y-4">
                {jobs.map((job) => (
                  <div key={job.id} className="bg-white p-4 rounded-lg shadow">
                    <p>
                      <strong>Company:</strong> {job.company}
                    </p>
                    <p>
                      <strong>Role:</strong> {job.role}
                    </p>
                    <p>
                      <strong>Date Applied:</strong>{" "}
                      {new Date(job.date).toLocaleDateString()}
                    </p>
                    <p>
                      <strong>Status:</strong> {job.status}
                    </p>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
